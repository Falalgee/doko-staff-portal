<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Staff Login – Doko International</title>
    <meta name="robots" content="noindex, nofollow" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet" />
    <style>
        body { font-family: 'DM Sans', sans-serif; background: #f8f9fa; }
        .card {
            background: #fff;
            border: 1px solid rgba(0,0,0,0.04);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02), 0 2px 4px -1px rgba(0,0,0,0.02);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center px-6">
    <div class="card p-10 rounded-2xl max-w-md w-full text-center">
        <h2 class="font-display text-3xl text-gray-900 mb-6">Staff Login</h2>
        <p class="text-sm text-gray-500 mb-8">Enter the staff password to continue.</p>
        <input type="password" id="password" class="w-full px-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl text-base outline-none focus:border-blue-500 focus:bg-white transition mb-4" placeholder="Password" />
        <p id="error" class="text-sm text-red-600 mb-4 hidden">Wrong password.</p>
        <button id="login-btn" class="w-full bg-gray-900 text-white font-medium py-4 rounded-full hover:bg-gray-800 transition">Unlock Dashboard</button>
    </div>

    <script>
        // --- Configuration ---
        const STAFF_PASSWORD = "admin123";      // ← change this!
        const DASHBOARD_URL = "dashboard.html";  // relative to this page

        const passwordInput = document.getElementById('password');
        const errorMsg = document.getElementById('error');
        const loginBtn = document.getElementById('login-btn');

        loginBtn.addEventListener('click', () => {
            if (passwordInput.value === STAFF_PASSWORD) {
                sessionStorage.setItem('staffLoggedIn', 'true');
                window.location.href = DASHBOARD_URL;
            } else {
                errorMsg.classList.remove('hidden');
            }
        });

        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loginBtn.click();
        });
    </script>
</body>
</html>
