<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Dashboard – Doko International Hotel</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
        .card { background: white; padding: 16px; margin: 10px 0; border-radius: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
        .error { color: red; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Staff Dashboard</h1>
    <p>Status: <span id="status">Loading…</span></p>

    <div class="card"><strong>Total Rooms:</strong> <span id="total-rooms">-</span></div>
    <div class="card"><strong>Rooms Booked:</strong> <span id="booked-rooms">-</span></div>
    <div class="card"><strong>Available Now:</strong> <span id="available-rooms">-</span></div>
    <div class="card"><strong>Pending:</strong> <span id="pending-count">-</span></div>
    <div class="card"><strong>Declined:</strong> <span id="declined-count">-</span></div>

    <script>
        const SUPABASE_URL = 'https://spdpjbvevlmuveclpfxs.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable__f_oEE6jlCMK8I9vGAd-nQ_f_4IHOhD';

        // Helper to call Supabase REST API
        async function supabaseGet(endpoint, queryParams = '') {
            const url = `${SUPABASE_URL}/rest/v1/${endpoint}?${queryParams}`;
            const response = await fetch(url, {
                headers: {
                    'apikey': SUPABASE_ANON_KEY,
                    'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                    'Content-Type': 'application/json'
                }
            });
            if (!response.ok) throw new Error(`${response.status} ${response.statusText}`);
            return response.json();
        }

        async function loadData() {
            const statusEl = document.getElementById('status');
            try {
                // 1. Get rooms (select=total_rooms)
                statusEl.textContent = 'Fetching rooms…';
                const rooms = await supabaseGet('rooms', 'select=total_rooms');
                const totalRooms = rooms.reduce((sum, r) => sum + r.total_rooms, 0);
                document.getElementById('total-rooms').textContent = totalRooms;

                // 2. Get confirmed bookings count
                statusEl.textContent = 'Fetching bookings…';
                const confirmedData = await supabaseGet('bookings', 'select=id&status=eq.confirmed');
                const confirmedCount = confirmedData.length;
                document.getElementById('booked-rooms').textContent = confirmedCount;
                document.getElementById('available-rooms').textContent = Math.max(totalRooms - confirmedCount, 0);

                // 3. Pending count
                const pendingData = await supabaseGet('bookings', 'select=id&status=eq.pending');
                document.getElementById('pending-count').textContent = pendingData.length;

                // 4. Declined count
                const declinedData = await supabaseGet('bookings', 'select=id&status=eq.declined');
                document.getElementById('declined-count').textContent = declinedData.length;

                statusEl.textContent = 'Loaded successfully.';
            } catch (err) {
                statusEl.innerHTML = '<span class="error">Error: ' + err.message + '</span>';
                console.error(err);
            }
        }

        loadData();
    </script>
</body>
</html>
