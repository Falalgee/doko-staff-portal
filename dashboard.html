<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase Test</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>Supabase Connection Test</h1>
    <pre id="result">Loading…</pre>

    <script>
        // Display any errors immediately
        window.onerror = function(msg, url, line, col, error) {
            document.getElementById('result').textContent = 
                'JS Error: ' + msg + ' at line ' + line;
        };

        try {
            // Check if Supabase library loaded
            if (typeof window.supabase === 'undefined') {
                document.getElementById('result').textContent = 
                    'Supabase library not loaded. Check internet connection.';
                throw new Error('Supabase library missing');
            }

            const SUPABASE_URL = 'https://spdpjbvevlmuveclpfxs.supabase.co';
            const SUPABASE_ANON_KEY = 'sb_publishable__f_oEE6jlCMK8I9vGAd-nQ_f_4IHOhD';
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            // Set a timeout in case the network hangs
            const timeout = setTimeout(() => {
                document.getElementById('result').textContent = 
                    'Timeout: The request took too long. Check your internet or Supabase status.';
            }, 10000);

            async function run() {
                const { data, error } = await supabase.from('rooms').select('total_rooms');
                clearTimeout(timeout);
                document.getElementById('result').textContent = error
                    ? 'Error: ' + error.message
                    : 'Success – rooms data: ' + JSON.stringify(data, null, 2);
            }

            run().catch(err => {
                clearTimeout(timeout);
                document.getElementById('result').textContent = 
                    'Caught error: ' + err.message;
            });
        } catch (err) {
            document.getElementById('result').textContent = 
                'Exception: ' + err.message;
        }
    </script>
</body>
</html>
