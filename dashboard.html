<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Dashboard – Doko International Hotel</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
        .card { background: white; padding: 16px; margin: 10px 0; border-radius: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
        .error { color: red; font-weight: bold; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>Staff Dashboard</h1>
    <p>Status: <span id="status">Loading…</span></p>

    <div class="card"><strong>Total Rooms:</strong> <span id="total-rooms">-</span></div>
    <div class="card"><strong>Rooms Booked:</strong> <span id="booked-rooms">-</span></div>
    <div class="card"><strong>Available Now:</strong> <span id="available-rooms">-</span></div>
    <div class="card"><strong>Pending:</strong> <span id="pending-count">-</span></div>
    <div class="card"><strong>Declined:</strong> <span id="declined-count">-</span></div>

    <script>
        const SUPABASE_URL = 'https://spdpjbvevlmuveclpfxs.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable__f_oEE6jlCMK8I9vGAd-nQ_f_4IHOhD';

        // Helper that returns both data and error details
        async function supabaseGet(endpoint) {
            const response = await fetch(`${SUPABASE_URL}/rest/v1/${endpoint}`, {
                headers: {
                    'apikey': SUPABASE_ANON_KEY,
                    'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                }
            });
            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`HTTP ${response.status}: ${errorText}`);
            }
            return response.json();
        }

        async function loadData() {
            const statusEl = document.getElementById('status');
            try {
                // 1. Rooms (already working)
                statusEl.textContent = 'Fetching rooms…';
                const rooms = await supabaseGet('rooms?select=total_rooms');
                const totalRooms = rooms.reduce((sum, r) => sum + r.total_rooms, 0);
                document.getElementById('total-rooms').textContent = totalRooms;

                // 2. Fetch all bookings (only need 'status' column)
                statusEl.textContent = 'Fetching bookings…';
                const bookings = await supabaseGet('bookings?select=status');

                let confirmed = 0, pending = 0, declined = 0;
                bookings.forEach(b => {
                    if (b.status === 'confirmed') confirmed++;
                    else if (b.status === 'pending') pending++;
                    else if (b.status === 'declined') declined++;
                });

                document.getElementById('booked-rooms').textContent = confirmed;
                document.getElementById('available-rooms').textContent = Math.max(totalRooms - confirmed, 0);
                document.getElementById('pending-count').textContent = pending;
                document.getElementById('declined-count').textContent = declined;

                statusEl.textContent = 'Loaded successfully.';
            } catch (err) {
                statusEl.innerHTML = '<span class="error">' + err.message + '</span>';
            }
        }

        loadData();
    </script>
</body>
</html>
