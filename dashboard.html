<!DOCTYPE html>
<html class="scroll-smooth" lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Staff Dashboard – Doko International Hotel</title>
    <meta name="robots" content="noindex, nofollow" />

    <!-- Tailwind + forms -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Premium Tailwind config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f8f9fa', 100: '#f1f3f5', 200: '#e9ecef', 300: '#dee2e6',
                            400: '#ced4da', 500: '#adb5bd', 600: '#868e96', 700: '#495057',
                            800: '#343a40', 900: '#212529',
                        },
                        surface: '#ffffff', 'surface-variant': '#f8f9fa',
                        'on-surface': '#212529', 'on-surface-variant': '#495057',
                        primary: '#111827', secondary: '#3b82f6', error: '#dc2626',
                        background: '#f8f9fa',
                    },
                    fontFamily: {
                        sans: ['DM Sans', 'Inter', 'system-ui', 'sans-serif'],
                        display: ['Playfair Display', 'Georgia', 'serif'],
                    },
                }
            }
        }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

    <style>
        body { font-family: 'DM Sans', sans-serif; }
        .premium-card {
            background: #ffffff;
            border: 1px solid rgba(0,0,0,0.04);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02), 0 2px 4px -1px rgba(0,0,0,0.02);
        }
        .btn-primary { @apply bg-primary text-white font-medium px-6 py-3 rounded-full hover:bg-primary/90 transition-all duration-200; }
        .btn-secondary { @apply bg-brand-50 text-primary font-medium px-6 py-3 rounded-full hover:bg-brand-100 transition-all duration-200 border border-brand-200; }
        .luxury-input { @apply w-full px-4 py-3.5 bg-brand-50 border border-brand-200 rounded-xl text-base text-on-surface placeholder:text-on-surface-variant/60 transition-all duration-200 outline-none; }
        .luxury-input:focus { @apply border-secondary bg-white; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
        .luxury-select {
            @apply w-full px-4 py-3.5 bg-brand-50 border border-brand-200 rounded-xl text-base text-on-surface appearance-none bg-no-repeat transition-all duration-200 outline-none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.75rem center;
            background-size: 1.5em 1.5em;
        }
        .luxury-select:focus { @apply border-secondary bg-white; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
    </style>
</head>
<body class="bg-background text-on-surface font-sans antialiased min-h-screen flex flex-col">

    <!-- Redirect to login if not authenticated -->
    <script>
        if (sessionStorage.getItem('staffLoggedIn') !== 'true') {
            window.location.replace('index.html');
        }
    </script>

    <!-- DASHBOARD CONTENT -->
    <div class="flex-grow px-6 md:px-12 max-w-[1400px] mx-auto w-full pt-12 pb-20">
        <!-- Top bar -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-12">
            <div>
                <h1 class="font-display text-4xl text-primary">Staff Dashboard v2</h1>
                <p class="text-on-surface-variant mt-1">Manage offline bookings &amp; monitor room availability.</p>
            </div>
            <button id="logout-btn" class="btn-secondary text-sm py-2.5 px-6">Log out</button>
        </div>

        <!-- Stats cards -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-6 mb-12">
            <div class="premium-card p-6 rounded-2xl">
                <p class="text-sm text-on-surface-variant uppercase tracking-wider mb-2">Total Rooms</p>
                <span id="total-rooms" class="text-4xl font-bold text-primary">-</span>
            </div>
            <div class="premium-card p-6 rounded-2xl">
                <p class="text-sm text-on-surface-variant uppercase tracking-wider mb-2">Rooms Booked</p>
                <span id="booked-rooms" class="text-4xl font-bold text-secondary">-</span>
            </div>
            <div class="premium-card p-6 rounded-2xl">
                <p class="text-sm text-on-surface-variant uppercase tracking-wider mb-2">Available Now</p>
                <span id="available-rooms" class="text-4xl font-bold text-green-600">-</span>
            </div>
            <div class="premium-card p-6 rounded-2xl">
                <p class="text-sm text-on-surface-variant uppercase tracking-wider mb-2">Pending</p>
                <span id="pending-count" class="text-4xl font-bold text-orange-500">-</span>
            </div>
            <div class="premium-card p-6 rounded-2xl">
                <p class="text-sm text-on-surface-variant uppercase tracking-wider mb-2">Declined</p>
                <span id="declined-count" class="text-4xl font-bold text-red-500">-</span>
            </div>
        </div>

        <!-- New booking form -->
        <div class="premium-card p-8 rounded-2xl mb-12">
            <h2 class="font-display text-2xl text-primary mb-6">New Offline Booking</h2>
            <form id="offline-booking-form" class="space-y-6">
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-primary mb-2">Full name *</label>
                        <input class="luxury-input" id="off-name" required placeholder="Guest full name" />
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-primary mb-2">Email</label>
                        <input class="luxury-input" id="off-email" type="email" placeholder="email@example.com" />
                    </div>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-primary mb-2">Phone *</label>
                        <input class="luxury-input" id="off-phone" required placeholder="0801 234 5678" />
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-primary mb-2">WhatsApp (optional)</label>
                        <input class="luxury-input" id="off-whatsapp" placeholder="2348012345678" />
                    </div>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-primary mb-2">Check‑in *</label>
                        <input class="luxury-input" id="off-checkin" type="date" required />
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-primary mb-2">Check‑out *</label>
                        <input class="luxury-input" id="off-checkout" type="date" required />
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-primary mb-2">Guests *</label>
                        <input class="luxury-input" id="off-guests" type="number" min="1" value="1" required />
                    </div>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-primary mb-2">Room type *</label>
                        <select class="luxury-select" id="off-room-type" required>
                            <option value="">Select room type</option>
                            <option value="standard">Standard Gateway – ₦10,000/night</option>
                            <option value="executive">Executive Suite – ₦15,000/night</option>
                            <option value="conference">Conference Suite – Custom</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-primary mb-2">Booking status</label>
                        <select class="luxury-select" id="off-status">
                            <option value="pending">Pending</option>
                            <option value="confirmed">Confirmed</option>
                            <option value="declined">Declined</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-primary mb-2">Special Requests</label>
                    <textarea class="luxury-input min-h-[100px]" id="off-special" placeholder="Dietary needs, airport pickup…"></textarea>
                </div>
                <button type="submit" class="btn-primary w-full py-4 text-base">Add Booking</button>
                <p id="off-msg" class="text-sm text-center hidden"></p>
            </form>
        </div>

        <!-- Recent bookings table -->
        <div class="premium-card p-8 rounded-2xl">
            <h2 class="font-display text-2xl text-primary mb-6">Recent Bookings</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead>
                        <tr class="text-left border-b border-brand-200">
                            <th class="py-3 pr-4 font-medium text-on-surface-variant">Guest</th>
                            <th class="py-3 pr-4 font-medium text-on-surface-variant">Room</th>
                            <th class="py-3 pr-4 font-medium text-on-surface-variant">Check‑in</th>
                            <th class="py-3 pr-4 font-medium text-on-surface-variant">Check‑out</th>
                            <th class="py-3 pr-4 font-medium text-on-surface-variant">Status</th>
                            <th class="py-3 font-medium text-on-surface-variant">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="bookings-table-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // ---------- Supabase config ----------
        const SUPABASE_URL = 'https://spdpjbvevlmuveclpfxs.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable__f_oEE6jlCMK8I9vGAd-nQ_f_4IHOhD';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ---------- Quick error display for debugging ----------
        window.onerror = function(message, source, lineno, colno, error) {
            document.body.innerHTML = '<div style="color:red;padding:20px;font-size:18px;">' +
                '<strong>Error:</strong> ' + message + '<br>' +
                'Line: ' + lineno + '<br>' +
                'Check console for more details.' +
                '</div>';
        };

        // Logout
        document.getElementById('logout-btn').addEventListener('click', () => {
            sessionStorage.removeItem('staffLoggedIn');
            window.location.href = 'index.html';
        });

        // ---------- Dashboard data loading (with built-in error display) ----------
        async function loadDashboardData() {
            try {
                // 1. Total rooms
                const { data: rooms, error: roomsErr } = await supabase.from('rooms').select('total_rooms');
                if (roomsErr) {
                    document.body.innerHTML = '<div style="padding:20px;font-size:18px;color:red;">Rooms error: ' + roomsErr.message + '</div>';
                    return;
                }
                const totalRooms = rooms?.reduce((sum, r) => sum + r.total_rooms, 0) || 0;
                document.getElementById('total-rooms').textContent = totalRooms;

                // 2. Confirmed bookings count
                const { count: confirmedCount, error: confirmedErr } = await supabase
                    .from('bookings')
                    .select('*', { count: 'exact', head: true })
                    .eq('status', 'confirmed');
                if (confirmedErr) {
                    document.body.innerHTML = '<div style="padding:20px;font-size:18px;color:red;">Confirmed error: ' + confirmedErr.message + '</div>';
                    return;
                }
                const booked = confirmedCount || 0;
                document.getElementById('booked-rooms').textContent = booked;

                // 3. Available rooms
                document.getElementById('available-rooms').textContent = Math.max(totalRooms - booked, 0);

                // 4. Pending count
                const { count: pendingCount, error: pendingErr } = await supabase
                    .from('bookings')
                    .select('*', { count: 'exact', head: true })
                    .eq('status', 'pending');
                if (pendingErr) {
                    document.body.innerHTML = '<div style="padding:20px;font-size:18px;color:red;">Pending error: ' + pendingErr.message + '</div>';
                    return;
                }
                document.getElementById('pending-count').textContent = pendingCount || 0;

                // 5. Declined count
                const { count: declinedCount, error: declinedErr } = await supabase
                    .from('bookings')
                    .select('*', { count: 'exact', head: true })
                    .eq('status', 'declined');
                if (declinedErr) {
                    document.body.innerHTML = '<div style="padding:20px;font-size:18px;color:red;">Declined error: ' + declinedErr.message + '</div>';
                    return;
                }
                document.getElementById('declined-count').textContent = declinedCount || 0;

                // 6. Recent bookings table
                const { data: recent, error: recentErr } = await supabase
                    .from('bookings')
                    .select('*')
                    .order('created_at', { ascending: false })
                    .limit(50);
                if (recentErr) {
                    document.body.innerHTML = '<div style="padding:20px;font-size:18px;color:red;">Recent error: ' + recentErr.message + '</div>';
                    return;
                }
                renderBookingsTable(recent || []);

            } catch (err) {
                console.error('Dashboard load error:', err);
                document.body.innerHTML = '<div style="padding:20px;font-size:18px;color:red;">Unexpected error: ' + err.message + '</div>';
            }
        }

        function renderBookingsTable(bookings) {
            const tbody = document.getElementById('bookings-table-body');
            if (!bookings.length) {
                tbody.innerHTML = `<tr><td colspan="6" class="py-6 text-center text-on-surface-variant">No bookings found.</td></tr>`;
                return;
            }
            tbody.innerHTML = bookings.map(b => {
                const statusBadge = b.status === 'confirmed'
                    ? 'bg-green-100 text-green-700'
                    : b.status === 'declined'
                    ? 'bg-red-100 text-red-700'
                    : 'bg-orange-100 text-orange-700';

                let actions = '';
                if (b.status === 'pending') {
                    actions = `
                        <div class="flex gap-2">
                            <button onclick="updateBookingStatus(${b.id}, 'confirmed')" class="text-sm text-green-600 hover:underline font-medium">Accept</button>
                            <button onclick="updateBookingStatus(${b.id}, 'declined')" class="text-sm text-red-500 hover:underline font-medium">Decline</button>
                        </div>
                    `;
                }

                return `
                    <tr class="border-b border-brand-100 hover:bg-brand-50 transition-colors">
                        <td class="py-4 pr-4">
                            <p class="font-medium text-primary">${escapeHtml(b.name)}</p>
                            <p class="text-xs text-on-surface-variant">${escapeHtml(b.phone || '-')}</p>
                        </td>
                        <td class="py-4 pr-4 text-on-surface-variant">${escapeHtml(b.room_type)}</td>
                        <td class="py-4 pr-4 text-on-surface-variant">${b.checkin}</td>
                        <td class="py-4 pr-4 text-on-surface-variant">${b.checkout}</td>
                        <td class="py-4 pr-4">
                            <span class="inline-block px-3 py-1 rounded-full text-xs font-medium ${statusBadge}">${b.status}</span>
                        </td>
                        <td class="py-4">${actions}</td>
                    </tr>
                `;
            }).join('');
        }

        // ---------- Update booking status ----------
        async function updateBookingStatus(bookingId, newStatus) {
            const { error } = await supabase
                .from('bookings')
                .update({ status: newStatus })
                .eq('id', bookingId);
            if (error) {
                alert('Failed to update status: ' + error.message);
            } else {
                loadDashboardData();
            }
        }

        // ---------- Add offline booking ----------
        const offlineForm = document.getElementById('offline-booking-form');
        const offMsg = document.getElementById('off-msg');

        offlineForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('off-name').value.trim();
            const email = document.getElementById('off-email').value.trim();
            const phone = document.getElementById('off-phone').value.trim();
            const whatsapp = document.getElementById('off-whatsapp').value.trim();
            const checkin = document.getElementById('off-checkin').value;
            const checkout = document.getElementById('off-checkout').value;
            const guests = parseInt(document.getElementById('off-guests').value);
            const roomType = document.getElementById('off-room-type').value;
            const status = document.getElementById('off-status').value;
            const special = document.getElementById('off-special').value.trim();

            const { error } = await supabase.from('bookings').insert([{
                name,
                email,
                phone,
                whatsapp_contact: whatsapp || phone,
                checkin,
                checkout,
                room_type: roomType,
                guests,
                special_requests: special,
                status,
                created_at: new Date().toISOString()
            }]);

            if (error) {
                offMsg.textContent = 'Error: ' + error.message;
                offMsg.className = 'text-sm text-center text-error mt-4 block';
            } else {
                offMsg.textContent = 'Booking added successfully!';
                offMsg.className = 'text-sm text-center text-green-600 mt-4 block';
                offlineForm.reset();
                loadDashboardData();
                setTimeout(() => offMsg.classList.add('hidden'), 3000);
            }
        });

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // TEMP DEBUG: show raw rooms data
        (async () => {
            const { data, error } = await supabase.from('rooms').select('total_rooms');
            if (error) {
                alert('Rooms error: ' + error.message);
            } else {
                alert('Rooms data: ' + JSON.stringify(data));
            }
        })();

        loadDashboardData();
    </script>
</body>
</html>
