<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase Test</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>Supabase Connection Test</h1>
    <pre id="result">Loading…</pre>

    <script>
        const SUPABASE_URL = 'https://spdpjbvevlmuveclpfxs.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable__f_oEE6jlCMK8I9vGAd-nQ_f_4IHOhD';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function run() {
            const { data, error } = await supabase.from('rooms').select('total_rooms');
            document.getElementById('result').textContent = error
                ? 'Error: ' + error.message
                : 'Success – rooms data: ' + JSON.stringify(data, null, 2);
        }

        run();
    </script>
</body>
</html>
